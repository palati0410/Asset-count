<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Physical Count</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-6">
    <div id="app" class="max-w-xl mx-auto space-y-4">
        <h1 class="text-2xl font-bold text-gray-800 text-center">ตรวจนับทรัพย์สินถาวร</h1>
        
        <div class="bg-white p-6 rounded-2xl shadow-lg space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">📸 ถ่ายรูป Asset Tag</label>
                <input type="file" accept="image/*" capture="environment" id="fileInput" 
                       class="w-full text-sm border p-2 rounded-lg bg-gray-50">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">🔢 Asset Code</label>
                <input type="text" id="assetCode" placeholder="รออ่านค่าจากรูป..." 
                       class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-lg">
            </div>
            
            <button onclick="addRecord()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md">
                ยืนยันการตรวจนับ
            </button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="font-bold text-gray-700">รายการที่ตรวจแล้ว (<span id="count" class="text-blue-600">0</span>)</h2>
                <button onclick="exportToCSV()" id="exportBtn" disabled 
                        class="text-sm border border-blue-500 text-blue-500 px-3 py-1 rounded-lg hover:bg-blue-50 disabled:opacity-30 disabled:border-gray-300 disabled:text-gray-300">
                    📥 Export CSV
                </button>
            </div>
            <ul id="recordList" class="text-sm text-gray-600 space-y-3">
                <li class="text-gray-400 italic text-center py-4">ยังไม่มีรายการที่ตรวจนับ</li>
            </ul>
        </div>
    </div>

    <script>
        let records = [];

        async function handleOCR(file) {
            const assetInput = document.getElementById('assetCode');
            assetInput.value = "⏳ กำลังประมวลผลรูปภาพ...";
            
            try {
                const result = await Tesseract.recognize(file, 'eng');
                assetInput.value = result.data.text.replace(/[^a-zA-Z0-9-]/g, ' ').trim();
            } catch (error) {
                assetInput.value = "❌ อ่านไม่สำเร็จ ลองถ่ายใหม่";
                console.error(error);
            }
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                handleOCR(e.target.files[0]);
            }
        });

        function addRecord() {
            const codeInput = document.getElementById('assetCode');
            const code = codeInput.value.trim();
            
            if (!code || code.includes("กำลังประมวลผล") || code.includes("อ่านไม่สำเร็จ")) {
                alert("กรุณารอให้อ่านค่าเสร็จ หรือกรอกรหัสให้ถูกต้อง");
                return;
            }

            records.push({
                code: code,
                time: new Date().toLocaleTimeString('th-TH')
            });

            updateUI();
            codeInput.value = "";
            document.getElementById('fileInput').value = "";
        }

        function updateUI() {
            const list = document.getElementById('recordList');
            const count = document.getElementById('count');
            const exportBtn = document.getElementById('exportBtn');
            
            count.innerText = records.length;
            exportBtn.disabled = records.length === 0;
            
            if (records.length === 0) {
                list.innerHTML = '<li class="text-gray-400 italic text-center py-4">ยังไม่มีรายการ</li>';
            } else {
                list.innerHTML = records.map((r, index) => `
                    <li class="flex justify-between items-center bg-gray-50 p-2 rounded-lg border">
                        <span class="font-mono font-bold">${r.code}</span>
                        <span class="text-xs text-gray-400">${r.time}</span>
                    </li>
                `).reverse().join('');
            }
        }

        function exportToCSV() {
            if (records.length === 0) return;
            const header = ["Asset Code", "Status", "Time"];
            const rows = records.map(r => [r.code, "Counted", r.time]);
            const csvContent = "\ufeff" + [header, ...rows].map(e => e.join(",")).join("\n");
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `Asset_Audit_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }
    </script>
</body>
</html>
